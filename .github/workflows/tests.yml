name: tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt ruff mypy
      - run: ruff check .
      - run: mypy pipeline bootloader attacks detector --ignore-missing-imports
      - run: pytest tests/ -v
